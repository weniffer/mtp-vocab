<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTP 商談單字對照表</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface-alt: #f0ede6;
    --border: #ddd9d0;
    --border-strong: #bbb6ac;
    --text-primary: #1a1916;
    --text-secondary: #5a5750;
    --text-muted: #9a9690;
    --accent: #2d6a4f;
    --accent-bg: #eaf4ee;
    --accent-border: #a8d5b8;
    --accent-text: #1e4d38;
    --medical-bg: #fff7ed;
    --medical-border: #fbc97a;
    --medical-text: #7c4b10;
    --exam-bg: #fef2f2;
    --exam-border: #fca5a5;
    --exam-text: #991b1b;
    --platform-bg: #eff6ff;
    --platform-border: #93c5fd;
    --platform-text: #1e3a8a;
    --biz-bg: #fefce8;
    --biz-border: #fde047;
    --biz-text: #713f12;
    --nego-bg: #f5f3ff;
    --nego-border: #c4b5fd;
    --nego-text: #4c1d95;
    --new-bg: #fee2e2;
    --new-border: #fca5a5;
    --new-text: #991b1b;
    --radius: 6px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans TC', 'Noto Sans JP', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--accent);
    color: #fff;
    padding: 1.5rem 2rem 1.25rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.03em;
    line-height: 1.3;
  }
  header .subtitle {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 2px;
  }
  header .count-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    white-space: nowrap;
  }

  /* Main */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 3rem;
  }

  /* Controls */
  .controls {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .search-row {
    position: relative;
  }
  .search-row svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  .search-row input {
    width: 100%;
    padding: 0 12px 0 34px;
    height: 38px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
  }
  .search-row input::placeholder { color: var(--text-muted); }

  .tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tag-row label {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 2px;
  }
  .tag-btn {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-strong);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .tag-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

  /* Stats bar */
  .stats-bar {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    padding-left: 2px;
    height: 18px;
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead tr {
    background: var(--surface-alt);
    border-bottom: 0.5px solid var(--border-strong);
  }
  thead th {
    padding: 9px 14px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: left;
  }
  th:nth-child(1) { width: 30%; }
  th:nth-child(2) { width: 22%; }
  th:nth-child(3) { width: 48%; }

  tbody tr {
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface-alt); }

  td {
    padding: 11px 14px;
    vertical-align: top;
  }

  .jp {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    line-height: 1.4;
  }
  .reading {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }
  .zh {
    font-size: 14px;
    color: var(--text-primary);
    font-weight: 500;
  }
  .note {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* Badges */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    border: 0.5px solid;
    vertical-align: middle;
    line-height: 1.6;
    white-space: nowrap;
  }
  .badge-medical   { background: var(--medical-bg);   border-color: var(--medical-border);   color: var(--medical-text); }
  .badge-exam      { background: var(--exam-bg);      border-color: var(--exam-border);      color: var(--exam-text); }
  .badge-platform  { background: var(--platform-bg);  border-color: var(--platform-border);  color: var(--platform-text); }
  .badge-biz       { background: var(--biz-bg);       border-color: var(--biz-border);       color: var(--biz-text); }
  .badge-negotiation { background: var(--nego-bg);    border-color: var(--nego-border);      color: var(--nego-text); }
  .badge-new       { background: var(--new-bg);       border-color: var(--new-border);       color: var(--new-text); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty strong { display: block; font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 1rem;
    font-size: 11px;
    color: var(--text-muted);
    align-items: center;
  }
  .legend span { margin-right: 2px; }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1rem 0.75rem 2rem; }
    th:nth-child(1) { width: 38%; }
    th:nth-child(2) { width: 28%; }
    th:nth-child(3) { width: 34%; }
    td { padding: 9px 10px; }
    .jp { font-size: 13px; }
    .zh { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>MTP 商談単語対照表</h1>
      <div class="subtitle">株式会社コノミティ・台湾商談用 ／ 日中対照</div>
    </div>
    <div class="count-badge" id="header-count">— 個</div>
  </div>
</header>

<main>
  <div class="controls">
    <div class="search-row">

    <div class="tag-row">

      <button class="tag-btn"        data-tag="negotiation" onclick="setTag('negotiation',this)">💬 商談用語</button>
    </div>
  </div>

  <div class="stats-bar" id="stats"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日文</th>
          <th>中文</th>
          <th>說明／例句</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="legend">
    <span>分類標籤：</span>
    <span class="badge badge-medical">醫療</span>
    <span class="badge badge-exam">検査</span>
    <span class="badge badge-platform">平台</span>
    <span class="badge badge-biz">商務</span>
    <span class="badge badge-negotiation">商談</span>
    <span class="badge badge-new">NEW</span>
    <span style="margin-left:4px">NEW = 從 Conomity 網頁補充</span>
  </div>
</main>

  { jp:"ご検討", rd:"ごけんとう", zh:"考慮評估", note:"「ぜひご検討ください」", tag:"negotiation", isnew:false },
  { jp:"ご質問", rd:"ごしつもん", zh:"提問", note:"「ご質問はございますか」", tag:"negotiation", isnew:false },
  { jp:"ご確認", rd:"ごかくにん", zh:"確認", note:"「後ほどご確認いただけますか」", tag:"negotiation", isnew:false },
  { jp:"先行ご紹介", rd:"せんこうごしょうかい", zh:"優先搶先介紹", note:"產品未公開前的優先展示", tag:"negotiation", isnew:false },
  { jp:"正式リリース前", rd:"せいしきリリースまえ", zh:"正式發布前", note:"說明網站尚未公開的理由", tag:"negotiation", isnew:false },
  { jp:"弊社", rd:"へいしゃ", zh:"敝公司", note:"自稱公司的謙虛說法", tag:"negotiation", isnew:false },
  { jp:"貴社", rd:"きしゃ", zh:"貴公司", note:"對對方公司的尊稱", tag:"negotiation", isnew:false },
  { jp:"おっしゃる通りです", rd:"おっしゃるとおりです", zh:"您說得對／正是如此", note:"附和對方意見的萬用句", tag:"negotiation", isnew:false },
  { jp:"少々お時間をいただけますか", rd:"しょうしょうおじかんをいただけますか", zh:"可以給我一點時間嗎", note:"口譯需要確認時使用", tag:"negotiation", isnew:false },
  { jp:"持ち帰って確認します", rd:"もちかえってかくにんします", zh:"帶回去確認後回覆", note:"無法當場回答時的緩衝句", tag:"negotiation", isnew:false },
  { jp:"条件面", rd:"じょうけんめん", zh:"條件方面", note:"「条件面についてはいかがでしょうか」", tag:"negotiation", isnew:false },
  { jp:"今後ともよろしくお願いします", rd:"こんごともよろしくおねがいします", zh:"今後也請多多關照", note:"商談結束的標準禮貌用語", tag:"negotiation", isnew:false },
];

const tagLabels = {
  medical: '醫療', exam: '検査', platform: '平台', biz: '商務', negotiation: '商談'
};

let activeTag = 'all';

function setTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function badgeHTML(tag) {
  const cls = { medical:'badge-medical', exam:'badge-exam', platform:'badge-platform', biz:'badge-biz', negotiation:'badge-negotiation' };
  return `<span class="badge ${cls[tag]}">${tagLabels[tag]}</span>`;
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = vocab.filter(v => {
    const matchTag = activeTag === 'all' || v.tag === activeTag;
    const matchQ = !q || v.jp.toLowerCase().includes(q) || v.zh.includes(q) || v.rd.toLowerCase().includes(q) || v.note.includes(q);
    return matchTag && matchQ;
  });

  const newCount = filtered.filter(v => v.isnew).length;
  const statsEl = document.getElementById('stats');
  const headerCount = document.getElementById('header-count');
  statsEl.textContent = filtered.length + ' 個單字（其中 ' + newCount + ' 個為網頁補充）';
  headerCount.textContent = filtered.length + ' 個';

  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty"><strong>找不到相符單字</strong>請嘗試其他關鍵字</div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(v => `
    <tr>
      <td>
        <div class="jp">
          ${escapeHTML(v.jp)}
          ${badgeHTML(v.tag)}
          ${v.isnew ? '<span class="badge badge-new">NEW</span>' : ''}
        </div>
        <div class="reading">${escapeHTML(v.rd)}</div>
      </td>
      <td><div class="zh">${escapeHTML(v.zh)}</div></td>
      <td><div class="note">${escapeHTML(v.note)}</div></td>
    </tr>
  `).join('');
}

render();
</script>
</body>
</html>
